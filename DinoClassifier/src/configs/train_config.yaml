training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.0001
  loss_fn: bce_with_logits  # cross_entropy, bce, bce_with_logits, mse
  optimizer: adam         # adam, adamw, sgd

model:
  repo_dir: /home/jingjie/DinoFT/dinov3
  checkpoint_path: /home/jingjie/DinoFT/DinoClassifier/models/dinov3_vits16_pretrain_lvd1689m-08c60483.pth
  hidden_units: 384
  freeze_backbone: false
  save_name: finetuning_test_100epoch_test.pth
  save_dir: ../trained_models

data:
  train_val_split: 0.9
  train_batches:
    - batch_production_202207_redone_rejectedcase/index_annotation.csv
    # - batch_production_202209_redone_rejectedcase/index_annotation.csv
    # - batch_legacy_20221026_subset/index_annotation_ori.csv

transform:
  image_size: 224
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
