evaluation:
  batch_size: 32
  threshold: 0.5            # Classification threshold for predictions
  num_workers: 4

model:
  repo_dir: /path/to/dinov3              # e.g., /home/user/DinoFT/dinov3
  backbone_name: dinov3_vits16
  checkpoint_path: /path/to/pretrained/dinov3_vits16_pretrain_lvd1689m-08c60483.pth
  hidden_units: 384
  trained_model: /path/to/runs/experiment_name.pth   # Path to your trained model

data:
  eval_batches:
    - path/to/eval_batch1/index_annotation.csv
    # - path/to/eval_batch2/index_annotation.csv
    # Add more evaluation batches as needed

output:
  results_dir: ../eval_results           # Directory to save evaluation results
  save_predictions: true                 # Whether to save per-sample predictions

transform:
  image_size: 512
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
