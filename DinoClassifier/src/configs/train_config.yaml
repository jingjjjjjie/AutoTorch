training:
  epochs: 5
  batch_size: 128
  learning_rate: 1e-4       # 1×10−4; typical is 1e-4 to 1e-5
  weight_decay: 1e-5        # typical is 1e-2 to 1e-5
  loss_fn: bce_with_logits  # cross_entropy, bce, bce_with_logits, mse
  optimizer: adamw          # adam, adamw, sgd

scheduler:
  warmup_epochs: 3          # 0 = disable; LR ramps 0 → full over N epochs
  decay_type: cosine        # 'cosine', 'step', or 'none'
  
  # StepLR params (if decay_type: step)
  step_size: 10             # decay every N epochs
  gamma: 0.1                # LR multiplier at each step
  
  # CosineAnnealingLR params (if decay_type: cosine)
  eta_min: 1e-6             # minimum LR at end of cosine cycle

model:
  repo_dir: /home/jingjie/DinoFT/dinov3
  checkpoint_path: /home/jingjie/DinoFT/DinoClassifier/models/dinov3_vits16_pretrain_lvd1689m-08c60483.pth
  hidden_units: 384
  freeze_backbone: false
  save_name: finetuning_test_100epoch_test.pth
  save_dir: ../runs

data:
  train_val_split: 0.9
  train_batches:
    - batch_production_202207_redone_rejectedcase/index_annotation.csv
    # - batch_production_202209_redone_rejectedcase/index_annotation.csv
    # - batch_legacy_20221026_subset/index_annotation_ori.csv

transform:
  image_size: 224
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]
